name: Publish CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Test, build, and publish ctx7proxy-cli
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify CLI
        run: |
          pnpm --filter ctx7proxy-cli lint:check
          pnpm --filter ctx7proxy-cli format:check
          pnpm --filter ctx7proxy-cli typecheck
          pnpm --filter ctx7proxy-cli test
          pnpm --filter ctx7proxy-cli build

      - name: Verify tag matches package version
        if: github.ref_type == 'tag'
        working-directory: packages/cli
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const v=require('./package.json').version;if(process.env.RELEASE_TAG !== 'v'+v)throw new Error('Tag must be v'+v)"

      - name: Publish package
        working-directory: packages/cli
        run: npm publish --access public --provenance
